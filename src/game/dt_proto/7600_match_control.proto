syntax = "proto3";
package match;


enum MATCH_CMD
{
    MATCH_CMD_NONE = 0;

    // 游戏服
    MATCH_CMD_GAME_START_REQ = 7600;         // 通知游戏服开始对局
    MATCH_CMD_GAME_RESULT_REPORT_REQ = 7601;    // 游戏服对局上报
    MATCH_CMD_GAME_FORCED_END_REQ = 7602;    // 游戏服对局结束
    MATCH_CMD_GAME_USER_LEAVE_REQ = 7603;    // 通知游戏服玩家离开对局
    MATCH_CMD_GAME_DROP_JOIN_QUEUE_REQ = 7604;    // point赛事玩家弃牌，立马进入匹配队列
    MATCH_CMD_REPORT_ROOM = 7605;            // 游戏进程启动上报游戏服信息
    MATCH_CMD_REPORT_RETIRE = 7606;          // 游戏服退休
    MATCH_CMD_CLOSE_ROOMSERVER = 7607;       // 关闭roomserver进程

    // 客户端
    MATCH_CMD_GAME_LAST_TABLE_PUSH = 7608; // 最后一桌通知
    MATCH_CMD_GAME_NOTIFY_PUSH = 7609;     // 距离比赛X分支开始通知 
    MATCH_CMD_GAME_READY_PUSH = 7610;      // 比赛游戏开始 
    MATCH_CMD_GAME_WAIT_PUSH = 7611;       // 比赛中场等待 
    MATCH_CMD_GAME_RESULT_PUSH = 7612;    // 比赛结果 
    MATCH_CMD_GAME_ADVANCE_PUSH = 7613;    // 比赛结果 
    MATCH_CMD_GAME_COUNT_DOWN_PUSH = 7614; // 倒计时
    MATCH_CMD_GAME_TIME_CRITICAL_PUSH = 7615; // 倒计时
    MATCH_CMD_GAME_RANK_PUSH = 7616; // 排名变化推送
    MATCH_CMD_GAME_NOTIFY_MESSAGE_PUSH = 7617; // 游戏内消息推送
    MATCH_CMD_GAME_DROP_MATCH = 7618; //point玩法弃牌匹配

    MATCH_CMD_USER_RECONNECT_MATCH_REQ = 7620;        // 重连 
    MATCH_CMD_USER_ENTER_MATCH_REQ = 7621;            // 进入比赛
    MATCH_CMD_USER_ENTER_MATCH_RESP = 7622;       // 进入比赛
    MATCH_CMD_USER_MATCH_INFO_REQ  = 7623;       // 请求赛事数据
    MATCH_CMD_USER_MATCH_INFO_RESP  = 7624;      // 赛事数据
    MATCH_CMD_USER_LEAVE_MATCH_REQ  = 7625;      // 退出比赛
    MATCH_CMD_USER_ALLOC_REQ  = 7626;           // 继续匹配
    MATCH_CMD_USER_GET_MATCH_DATA_REQ  = 7627;  // 获取赛事数据
    MATCH_CMD_USER_GET_MATCH_DATA_RESP  = 7628;  // 获取赛事数据回复
    MATCH_CMD_USER_GET_START_MATCH_REQ  = 7629;  // 获取开赛数据

    MATCH_CMD_GAME_ROUND_RECONNECT_REQ = 7630; // 游戏对局重连 
    MATCH_CMD_GAME_WAIT_RECONNECT_PUSH = 7631; // 游戏等待重连 

    MATCH_CMD_USER_GET_MATCH_RANK_DATA_REQ  = 7632;  // 获取赛事排行数据
    MATCH_CMD_USER_GET_MATCH_RANK_DATA_RESP  = 7633;  // 获取赛事排行数据

    MATCH_CMD_USER_UPDATE_AGENT_REQ  = 7634;  // 用户Agent更新
    MATCH_CMD_USER_UPDATE_MATCH_INFO_REQ  = 7635;  // 用户回复开赛信息

    MATCH_CMD_GAME_REAL_RESULT_PUSH_REQ  = 7636;  // 结果推送

    MATCH_CMD_USER_REBUY_SELECT_REQ  = 7637;  // 用户重复买入界面操作
    MATCH_CMD_USER_REBUY_PUSH = 7638; //重复买入推送
    MATCH_CMD_USER_REBUY_RESULT_PUSH = 7639; //重复买入结果推送

    MATCH_CMD_GAME_SHARE_REQ = 7640; // 分享请求
    MATCH_CMD_GAME_SHARE_RESP = 7641; // 分享数据回复

    MATCH_CMD_SHARE_USER_NUM_REQ = 7642;        // 联赛分享次数请求
    MATCH_CMD_SHARE_USER_NUM_RESP = 7643;       // 联赛分享次数回复
    MATCH_CMD_SHARE_REWARD_NOTICE_PUSH = 7644;  // 联赛分享派奖奖励通知客户端

    MATCH_CMD_TEST = 7650;
    MATCH_CMD_TABLE_END_TEST = 7651;
    MATCH_CMD_REAL_MATCH_TEST = 7652;
    MATCH_CMD_REBUY_TEST = 7653;

    //Publish服
    MATCH_CMD_PUBLISH_PLAYER_FULL_REQ = 7660;   //请求-人满赛人满通知开赛
    MATCH_CMD_PUBLISH_PLAYER_FULL_RESP = 7661;  //返回-人满赛人满通知开赛
    MATCH_CMD_PUBLISH_NEW_PLAYER_REQ = 7662;    //请求-爽局生成
    MATCH_CMD_PUBLISH_NEW_PLAYER_RESP = 7663;   //返回-爽局生成
    MATCH_CMD_PUBLISH_PLAYER_ELIMINATED_PUSH = 7664;    //玩家淘汰通知
    MATCH_CMD_PUBLISH_REGIST_REQ = 7665;        //当startmatch在配置的结束报名时间前的时候, 这段时间报名的玩家需要通知给yohu的实例
    MATCH_CMD_PUBLISH_REGIST_RESP = 7666;
    MATCH_CMD_PUBLISH_USER_HISTORY_ELIMINATED_PUSH = 7667;  //玩家淘汰比赛未结束通知publish展示对应的比赛记录
    MATCH_CMD_PUBLISH_NEW_PLAYER_MATCH_END_PUSH = 7668;     //爽局完成通知
    MATCH_CMD_DAEL_RANK_PUSH = 7654;
}

message GameStartUserInfo 
{
	uint32 uid = 1;
	int32 agent_id = 2;
    int64 score     = 3;//积分(deals rummy 新增)
    int32 bot_flag  = 4;//是否是机器人(deals rummy 新增)
    int32 leave_flag = 5;//是否真人已经退出此场 deals(deals rummy 新增)
    int32 game_id = 6;
    int32 level_id = 7; 
    int32 seat_id = 8;  // 座位号
    bool is_mixed = 9;  //是否混战用户
    string userInfo = 10;

    //新增:
    int32 num = 11;
    int32 kick = 12;
    int64 alloc_param = 13;   // -1 换桌  其他离开
    int64 balance = 14; //钱
    bool bLeave = 15;   //离开标志
    int64 nBetOrderId = 16;	// 下注预扣订单交易序号	
    string user_conf = 17; //用户个人配置 数值相关 json格式
    bool is_last_rebuy = 18; //是否是最后阶段rebuy机会
}

// 比赛游戏开始
message GameStartReq
{
    int32 table_id = 1;   //桌子id
    string match_data = 2;  // 赛事数据 json格式
    string table_conf = 3; // 桌子配置 json格式
    repeated GameStartUserInfo user_list = 4; // 玩家数据（包含数值发牌）
}

// 游戏服结算上报
message GameResultReportReq
{
    message User 
    {
		uint32 uid = 1;
        int64 score = 2;
        int32 seatid = 3;
        int32 operation_time = 4;   // 该局玩家操作花费时间
        int32 wrong_card_num = 5; // 异常行为-错牌次数
    }
    string match_instance_id = 1;//赛事实例id
    int32 table_id = 2;
    repeated User user_list = 3;
    int32 round_time = 4;     // 该局花费秒数
}

// 强制结束当前桌子游戏
message GameForcedEndReq
{
    string match_instance_id = 1;
    repeated int32 table_id = 2; 
}

// 用户离开
message GameUserLeaveReq
{
    uint32 uid          = 1;
    int32 agent_id      = 2;
}

message GameUserGetTableInfoReq
{
    uint32 uid = 1;
    string match_instance_id = 2;
    int32 table_id = 3;
}

// 游戏服上报退休
message ReportRoomRetire
{
    int32 svid          = 1;
    int32 status        = 2;
}

// 游戏服启动进程上报游戏服信息
message ReportRoomData
{
    int32 svid          = 1;
    int32 game_id       = 2;
}

// 通知roomserver可以退休了
message CloseRoomReq
{
    int32 svid          = 1;
    int32 game_id       = 2;
}

//======================================================================================================

// 客户端
// 玩家对局重连

message UserEnterMatchReq
{
    uint32 uid = 1;
    string match_instance_id = 2;//赛事实例id
    string userinfo = 3; // 玩家信息
}

message UserEnterMatchResp
{
    string match_instance_id = 1;//赛事实例id
    int32 result = 2; //成功1 失败0
    int32 svid = 3;
    bool is_wait = 4;  // 否刚刚开赛
    int32 game_id = 5;
}

message UserMatchInfoReq
{
    uint32 uid = 1;
    string match_instance_id = 2;//赛事实例id
}

message UserMatchInfoResp
{
    string match_instance_id = 1;//赛事实例id
    int32 status = 2; // 比赛状态（2-比赛倒计时 3-比赛中 6-比赛结束）
    int32 cur_lv = 3;//总阶段数
    int32 total_lv_num = 5;//总阶段数
    bool is_allocating = 6;//是否处于匹配中
    int32 phase_time = 7;//阶段时间
    int32 phase_count_down = 8;//阶段倒计时
    int32 extra_count_down = 9;//额外倒计时
    int32 cur_rank = 10;//当前排名
    bool is_start = 11;//是否刚刚开赛
    int32 cur_remain_user = 12;//当前剩余玩家
    int32 reward_rank = 13;//钱圈玩家排名
    string client_config = 14;
    int32 cur_table_id = 15; // 桌子号
    bool need_resp = 16; // 是否需要答复
    bool is_eliminated = 17; // 是否淘汰
    int64 point_value = 18;  
    int64 qualify_chips = 19;
    int32 advance_num = 20; // 晋级人数
}

// 玩家比赛重连
message UserReconnectReq
{
    uint32 uid = 1;
    string userinfo = 3; // 玩家信息
}

// 玩家对局重连
message UserReconnectMatchReq
{
    uint32 uid = 1;
    string match_instance_id = 2;//赛事实例id
    int32 table_id = 3;   //桌子id
    int32 agent_id = 4;   // agent_id
}

// 
message UserUpdateMatchInfoReq
{
    uint32 uid = 1;
    string match_instance_id = 2;//赛事实例id
}


// 玩家获取桌子数据
message UserGetTableInfoReq
{
    uint32 uid = 1;
    string match_instance_id = 2;//赛事实例id
}

message UserOnlineNotifyPush
{
    uint32 uid = 1;
    string match_instance_id = 2;//赛事实例id
    int32 agent_id = 3; // agent_id
}

message UserLeaveMatchReq
{
    uint32 uid = 1;
    string match_instance_id = 2;//赛事实例id
}

message UserMatchDataReq
{
    uint32 uid = 1;
    string match_instance_id = 2;//赛事实例id
}

message PageInfo
{
    int32 index = 1;                //第几页 从0开始
    int32 size = 2;                 //每页条数
}

message UserMatchDataRankReq
{
    uint32 uid = 1;
    string match_instance_id = 2;//赛事实例id
    PageInfo page = 3; //分页
}

message UserGetMatchStartInfoReq
{
    uint32 uid = 1;
    string match_instance_id = 2;//赛事实例id
}

message MatchRankData
{
    uint32 uid = 1;
    string name = 2;
    int32 rank = 3;
    int64 chip = 4;
    int64 score = 5;
    int64 table_id = 6;
    int64 is_eliminated = 7;
}

message MatchPhaseData
{
    int32 phase = 1;
    int32 time = 2;
    int64 phase_ante = 3;
    int64 qualify = 4;
    repeated Item rebuy_Item_list = 5;
    int64 rebuy_reload = 6;
    int32 rebuy_cnt = 7;

    // deal
    int32 advance_num = 8; // 晋级人数
    int32 user_num = 9;   // 玩家数量
    int32 round_num = 10;   // 对局数
    int32 table_num = 11;   // 桌子数
}

message MatchPriceData
{
	uint32 rank_from = 1; //排名区间, 从第几名开始, 最小是1
    uint32 rank_to = 2; //排名区间, 到第几名结束
    repeated Reward reward_list = 3; //奖励列表
}

message UserMatchDataResp
{
    uint32 uid = 1;
    string match_instance_id = 2;//赛事实例id
    string match_name = 3;//比赛名字
    uint32 match_user_num = 4;//玩家数量
    uint32 cur_phase_ante = 5;//底分
    uint32 cur_lv = 6;//当前阶段
    uint32 total_lv = 7;//总阶段数
    repeated MatchPhaseData phase_data = 8;
    repeated MatchPriceData price_data = 9;
}

message UserMatchDataRankResp
{
    repeated MatchRankData rank_data = 1;
    MatchRankData my_rank = 2; //总阶段数
    uint32 data_num = 3; // 返回数据数量，deal为桌数
    int32 index = 4;  //第几页
    string match_instance_id = 5;//赛事实例id
}

message UserShareResp
{
    uint32 uid = 1;
    string match_instance_id = 2;//赛事实例id
    SharePosterMixed mix_data = 3;
}

// point玩家请求
message UserAllocReq
{
    uint32 uid = 1;
    string match_instance_id = 2;//赛事实例id
    int32 operation = 3;// 匹配 = 1 or等待 = 2
}

// 赛事分享 5： 1-自动弹出赛后分享 2-主动点击赛后分享 3-历史记录分享
// 买入分享 6： 1-Ruby分享 2-Rejoin
message UserShareReq
{
    uint32 uid = 1;
    string match_instance_id = 2;//赛事实例id
    uint32 share_type = 3; // 分享请求类型  
    uint32 sub_type = 4; // 分享请求子类 
    string user_info = 5; 
}

// 最后一桌通知
message GameLastTablePush
{

}

// 开赛前x分钟通知
message GameNotifyPush
{
    string match_instance_id = 1;//赛事实例id
    int32 svid = 2;
    string name = 3;//赛事名称
    int32 countdown = 4;//倒计时
    
    int32 notify_id = 5;  // 通知id
    int32 notify_user_type = 6; // 1:有门票的用户，2：已报名赛事的用户
    int32 trigger_type = 7; // /1:条件发送，2：定时发送
    int32 pre_match_time = 8; 
    uint32 fixed_time = 9;
    string data = 10;
}

message GameNotifyMessagePush
{
    int32 type = 1; // 消息类型
    string trans = 2;   
}

// 比赛开始
message GameReadyPush
{
    string match_instance_id = 1;//赛事实例id
    uint32 count_down = 2;
    int32 total_lv_num = 3;//总阶段数
    int32 phase_count_down = 4; // 阶段倒计时
}

// 比赛开始
message GameStartPush
{

}

// 比赛游戏中场等待
message GameWaitPush
{
    int32 game_id = 1;//游戏id 
    int64 match_id = 2;//赛事id
    string match_instance_id = 3;//赛事实例id
    int32 status = 4; // 比赛状态   
    int32 total_lv_num = 5;//总阶段数
    int32 cur_lv = 6;//当前阶段
    int32 cur_rank = 7;//当前排名
    int32 next_lv_num = 8;//晋级人数
    int32 not_finish_num = 9;//未完成桌数
    int32 countdown = 10;//倒计时

    // point用
    int64 chip = 11;//筹码
    int32 phase_count_down = 12; // 阶段倒计时
    int32 qualify_chips = 13; // 筹码
}

// 当前轮次剩余时间不足1分钟，此时玩家结束对局并且玩家当前筹码数满足下一轮次的晋级条件推送
message GamePointTimeCriticalPush
{
    int32 game_id = 1;//游戏id 
    int64 match_id = 2;//赛事id
    string match_instance_id = 3;//赛事实例id
}

// point 弃牌匹配用
message GameDropMatchPush
{
    int32 game_id = 1;//游戏id
    uint32 uid = 2;
    int32 table_id = 3;   //桌子id
    bool rebuy_sucess = 4; //买入复活  
    string match_instance_id = 5;//赛事实例id
}

message RankInfo
{
    uint32 uid = 1;
    int32 cur_rank = 2;
}

// 排名变化推送
message GameRankPush
{
    int32 game_id = 1;//游戏id 
    int64 match_id = 2;//赛事id
    string match_instance_id = 3;//赛事实例id
    int32 cur_rank = 4;//当前排名
    int32 cur_remain_user = 5;//当前剩余玩家
    int32 reward_rank = 6;//钱圈玩家排名
    repeated RankInfo other_rank_info = 7;
}

message GameCountDownPush
{
    int32 countdown = 1;//倒计时
    string match_instance_id = 2;//赛事实例id
}

message Poster
{
    int32 id = 1;
    string url = 2;
}

message SharePoster
{
    string title = 1;
    string share_url = 2;
    string telegram = 3;
    string whatsapp = 4;
    repeated Poster poster = 5;
}

//在SharePosterResp的基础上,合入了对应分享配置的内容
message SharePosterMixed
{
    uint32 game = 1;
    uint32 share_type = 2;
    string invite_code = 3;
    SharePoster data = 4;
    int32 reward_cond = 5;  //派奖条件: 1 分享即派奖 2 注册即派奖  3 有效裂变派奖
    int32 show_flags = 6;	//第0bit位表示是否显示下载图片, 
                            //第1bit位表示是否显示复制链接, 
                            //第2bit位表示是否显示二维码
    repeated string download_pics = 7;   //分享的背景图  第一张是竖版  第二张是横板
    uint32 sub_type = 8; //子類型  
}

message Reward
{
    int64 id = 1;   //奖励ID
    int32 type = 2; // 奖励类型  1 2 
    int64 num = 3; //奖励数量
}

// 比赛结束/淘汰
message GameResultPush
{
    int64 rank = 1; //名次
    repeated Reward reward_list = 2; //奖励列表
    SharePoster data = 3; // 分享海报
    int32 task_id = 4; //任务配置id
    bool is_new_player = 5; // 是否爽局
    int32 match_type = 6; // 赛事类型
    string match_name = 7; //赛事名称

	bool is_open = 8;			//总开关
	bool begin_time_switch = 9;	//开赛时间开关
	bool winning_switch = 10;			//奖金开关
	bool regist_switch = 11;			//报名费开关
    bool share_auto_screenshot = 12;    //分享自动截图开关 爽局用的
    SharePosterMixed mix_data = 13;    //分享海报新 
    string match_instance_id = 14;//赛事实例id
    uint32 share_num = 15;          //联赛分享次数
}

message GameRealResultPush
{
    int64 rank = 1; //名次
    repeated Reward reward_list = 2; //奖励列表
    string match_instance_id = 3;//赛事实例id
}

message GameAdvancePush
{
    int32 cur_lv = 1;//当前阶段
    int32 cur_rank = 2;//排名
    int32 next_lv_num = 3;//晋级人数
    int32 not_finish_num = 4;//未完成桌数
    int32 countdown = 5;//倒计时

    int64 chip = 6;//筹码
    string match_instance_id = 7;//赛事实例id
    int32 qualify_chips = 8; // 筹码
}

message Item
{
    int64 id = 1;   //ID
    int32 type = 2; // 类型  1 2 
    int64 num = 3; //数量
}

message UserRebuyReq
{
    string match_instance_id = 1;   //比赛实例id
    uint32 uid = 2;
    uint32 type = 3; // 1: share买入  2: rebuy买入
    uint32 operation = 4; // 0 - 拒绝买入  1 - 确定买入
}

message GameRebuyPush
{
    string match_instance_id = 1;   //比赛实例id
    uint32 type = 2; // 1: share买入  2: rebuy买入
    repeated Item cost = 3; // 花费
    uint32 chips = 4; // 买入积分
    int64 rebuy_time = 5; // 复活展示时间
    SharePosterMixed data = 6; // 分享海报
    uint32 share_time = 7; // 分享时长
    int64 up_condition = 8; // 阶段分数条件
    repeated Reward top_reward = 9; // 第一名奖励
    int64 end_time = 10; // 结束时间
}

message GameRebuyResultPush
{
    string match_instance_id = 1;   //比赛实例id
    uint32 type = 2; // 1: share买入  2: rebuy买入
    bool success = 3; // 是否成功买入
    uint32 error_code = 4; // 1-资产不足 2-超时  3-其他
    int64 balance = 5; // 余额
}

message TestRealMatchReq
{
    int32 action = 1; //1:创建比赛 2:开启比赛
    string match_instance_id = 2; //赛事实例id
    int32 begin_delay = 3; //多少秒后开启比赛
}

message PublishPlayerFullReq
{
    int32 game_id = 1;
    string match_instance_id = 2;   //比赛实例id
    string trans = 3;
    uint32 uid = 4;
    int64 balance = 5;
    int64 instance_id = 6;
}

message PublishPlayerFullResp
{
    int32 result = 1;
    string new_match_instance_id = 2;   //新的人满赛实例id
    string trans = 3;
    uint32 uid = 4;
    int64 balance = 5;
    int64 new_instance_id = 6;
}

message PublishNewPlayerReq
{
    int32 game_id = 1;
    string trans = 2;
    uint32 uid = 3;
    string regist_match_instance_id = 4;
    bool playerfull_start = 5;

    uint32 match_config_id = 6;
    uint32 match_begin_time = 7;
    int64 match_instance_id = 8;
    uint32 match_type = 9;
}

enum NewPlayerErrCode
{
    SUCCESS = 0;        //成功
    REDIS = 1;
    SERVER = 2;
    NOT_OPEN = 3;
}

message PublishNewPlayerResp
{
    NewPlayerErrCode err_code = 1;
    string trans = 2;
    uint32 uid = 3;
    uint32 svid = 4;
    uint32 game_id = 5;
}

message PlayerEliminatedPush
{
    string match_instance_id = 1;
    uint32 uid = 2;
}


message PublishUserHistoryEliminatedPush
{
    uint32 uid = 1;
    string history = 2;
};

message PublishNewPlayerMatchEndPush
{
    uint32 uid = 1;
    string match_instance_id = 2;
}

//联赛分享次数请求
message LeagueShareNumReq
{
    uint32 uid = 1;
    string match_instance_id = 2;
}

message LeagueShareNumResp
{
    uint32 uid = 1;
    uint32 share_num = 2;
}

message LeagueRewardResultPush
{
    uint32 uid = 1;
    uint32 result = 2;  // 1.成功  0.失败
    Item reward = 3;
}

message GameDealRankPush
{
    repeated RankInfo rank_info = 1;
}