}
//===========================================league赛事========================================================
// 动画播放参数
message AnimationParameters
{
    uint32 id = 1;                          // id
    string name = 2;                        // 动画名
}

// 联赛阶段定义
enum JointMatchPhase
{
    ERROR = 0;                  // 错误
    AUDITION = 1;               // 海选赛
    PRELIMINARY_ROUND = 2;      // 初赛
    SEMIFINAL = 3;              // 半决赛
    FINALS = 4;                 // 决赛
    TATOL_FINALS = 5;           // 总决赛
    BREAK_THROUGH = 100;        // 突围赛
}

// 联赛门票信息
message JointMatchProp
{
    int64 id = 1;       //道具id
    int64 num = 2;      //道具数量
    int32 type = 3;     //道具类型
    int64 active_times = 4;
}

// 联赛阶段
message SubMatch
{
    JointMatchPhase phase = 1;             // 联赛阶段:海选赛/初赛/半决赛/决赛/总决赛，取值JointMatchPhase
    string name = 2;              // 赛事名称
    repeated int64 match_config_id = 3;     //  关联的赛事配置ID
    int64 begin_time = 4;        // 阶段开始时间
    int64 end_time = 5;          // 阶段结束时间
    JointMatchProp ticket = 6;           // 奖励门票
    string icon = 7;          // 联赛背景图
    bool notify = 8; //true 为需要通知/false 为不需要通知
}

//icon动画类型
enum IconPlayType
{
    IMAGE = 0;              // 图片
    ANIM = 1;               // 动画
}

//席位来源
enum SlotsSource
{
    NORMAL = 0;              // 普通
    BONUS = 1;               // 活动
}

message FaqQuestion
{
    string faq_title = 1;            // 标题
    string faq_answer = 2;       // 答案
}

//决赛门票
message FinalsSlots
{
    SlotsSource source = 1;        // 来源
    uint32 total = 2;            // 总席位
    uint32 obtained = 3;       // 获得的席位
}

//决赛记录
message JointMatchFinals
{ 
    int32 game_id = 1;              //游戏id 
    int64 match_config_id = 2;      //赛事id
    string match_instance_id = 3;   //赛事实例id
    MatchStatus match_status = 4;  //比赛状态
    string match_name = 5;          //赛事名
    int32 match_end_time = 6;       //总决赛结束时间
    uint32 match_begin_time = 7;    //总决赛开始时间
}

 
//联赛请求
message JointMatchInfoReq
{  
    uint32 uid = 1;
} 

//决赛门票
message FinalTicket
{ 
    uint32 uid = 1;         //玩家id
    string user_name = 2;   //玩家昵称
    uint32 user_head = 3;   //玩家头像数
    JointMatchProp prop = 4;//奖励门票 
}

//联赛回复
message JointMatchInfoResp
{
    string name = 1;                     // 联赛名称
    IconPlayType icon = 2;               // 联赛图标 1:静态图 2:spine动画
    string png = 3;                      // png
    string atlas = 4;                    // atlas文件
    string skel = 5;                     // skel文件
    repeated AnimationParameters parameters = 6;    // 动画播放参数
    string picture = 7;                  // 联赛宣传图
    int64  begin_time = 8;               // 联赛开赛时间
    int64  end_time = 9;               // 联赛结束时间
    int64 show_begin_time = 10;         // 联赛展示时间
    int64 reward_end_time = 11;         // 联赛奖励结束时间，2025-01-06 10:00:00
    int64 secondary_tab_begin_time = 12;// 联赛二级页签开始时间，2025-01-06 10:00:00
    int64 secondary_tab_end_time = 13;  // 联赛二级页签结束时间，2025-01-06 10:00:00
    uint64 total_prize_pool = 14;        // 联赛总奖金池
    repeated SubMatch sub_match = 15;               // 联赛子赛事
    uint32 break_through_match_open = 16;           // 突围赛开关
    SubMatch break_through = 17;  // 突围赛配置
    repeated FaqQuestion faq = 18;      // FAQ
    JointMatchFinals jointMatchFinals = 19; //决赛数据
    uint32 jointmatch_id = 20; // 联赛id
    string label = 21; // 标签
    uint32 result = 22; // 1成功 0失败
    int64 server_time = 23;                         // 服务器当前时间
}

//
message JointMatchNotifyReq { 
    uint32 jointmatch_id = 1;
    JointMatchPhase phase = 2;  
    uint32 op_type = 3; //0 开启，1 关闭
    string user_info = 4;           //登录获取的用户信息
}

message JointMatchNotifyResp { 
    uint32 result = 1;
}

message JointMatchFinalListReq { 
    PageInfo page = 1;              //排行榜分页
}

message JointMatchFinalListResp { 
    uint32 total_size = 1;
    repeated FinalTicket final_ticket = 2; 
    PageInfo page = 3;              //排行榜分页
    repeated FinalsSlots slots = 4; // 席位
    JointMatchProp self_final_ticket = 5;     // 我的决赛门票
}

message RummyTrafficReq 
{ 
    uint32 uid = 1;
    int64 balance = 2;
    int32 agency_id = 3;
}

message TrafficLevelConfig 
{
    int32 game_id = 1;          // 游戏ID
    int32 seat_count = 2;       // 人数
    int32 level = 3;            // 房间等级
    int64 base_ante = 4;        // 基础底注
    int64 entry_min = 5;        // 入场最小门槛
    int64 entry_max = 6;        // 入场最大门槛 -1表示无限
    string title = 7;           // 房间名称/标题
    int64 recommend_min = 8;    // 推荐最小值
    int64 recommend_max = 9;    // 推荐最大值 -1表示无限
    int64 bet_min = 10;         // 下注最小值
    int64 bet_max = 11;         // 下注最大值 -1表示无限
    int64 pay_max = 12;         // 支付上限 -1表示无限
    repeated int64 quick_ante = 13;  // 快速下注选项
    bool is_open_jackpot = 14;       // 是否开启 jackpot
    int32 room_tab = 15;             // 房间类型 0普通 1单人模式
    int32 round = 16;          // 扩展字段
}

message TabConfig 
{
    int32 tab = 1; // 页签  1->cash-rummy  2->Torunament  3->event  4->MAX_REG_NUM_OUT
    int32 recommend_type = 2; // 1 cash-rummy  2 Torunament rummy(复用请求续局接口)
    TrafficLevelConfig level_cfg = 3; 
    int32 strategy = 4; // 1-最近一场 2-最近10场
}

message RummyTrafficResp
{ 
    repeated TabConfig tab_cfg_list = 1; 
    TrafficLevelConfig settle_cfg = 2; // 结算推荐配置
    string client_common_config = 3;
    int32 status = 4;  // 状态
    int32 count = 5;   // 弹出次数
    int32 show_time = 6;    // 展示时间
}

message UserShareReq
{
    uint32 uid = 1;
    uint32 share_type = 2; // 分享请求类型  
    uint32 sub_type = 3; // 分享请求子类 
    string user_info = 4; 
}

message UserShareResp
{
    uint32 uid = 1;
    SharePosterMixed mix_data = 2;
}
