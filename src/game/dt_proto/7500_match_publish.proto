{
    uint32 uid = 1;
    string match_instance_id = 2;
    string user_info = 3;
    int32 game_id = 4;
    int64 total_reward = 5;
    string match_name = 6;
    int64 match_end_time = 7;
    int32 is_league = 8; //是否是联赛 1.是  0.否
}

//玩家历史记录分享
message UserHistoryShareResp
{
    int32 result = 1;
    string match_instance_id = 2;
    SharePoster data = 3;
    int32 rank = 4;     //排名
    int64 reward = 5;   //奖励
    int64 total_reward = 6;
    string match_name = 7;
    int64 match_end_time = 8;
    SharePosterMixed mix_data = 9; //新分享接口;
}

message UserJoinMatchInfoReq
{  
    uint32 uid = 1;
    string device_id = 2;
    string user_info = 3;           //登录获取的用户信息
}

message UserJoinMatchInfoResp
{  
    uint32 uid = 1;
    int32 guide_flag = 2;
    int32 free_num_flag = 3;
    int32 recharge_num = 4;
    int32 history_join_num = 5;
    int32 cash_rummy_round_num = 6; //cash rummy对局数
}

//单机爽局结束上报
message MatchNewPlayerRankInfo {
    uint32 uid = 1;
    string name = 2;
    string head = 3;
    int64 score = 4;
    int32 lv = 5;
    int32 rank = 6;
    int64 winnings = 7;
