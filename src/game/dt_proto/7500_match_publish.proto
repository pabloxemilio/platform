//获取赛事列表
message MatchListReq {
    int32 game_id = 1;      //游戏id
    uint32 uid = 2;         //玩家id
    TagType tag_type = 3;   //ALL Cash Free Registered
    int32 push_num = 4;     //推送次数
    int32 agency_id = 5;    //分盘 id
}

enum TagType
{
    TAG_ALL = 0;
    TAG_CASH = 1;
    TAG_FREE = 2;
    TAG_REGIST = 3;
}

enum UserStatus
{
    NO_REGIST = 0;  //未报名
    REGIST = 1;     //已报名
    ELIMINATED = 2; //已淘汰
}

enum MatchStatus
{
    DEFORE = 0; //没开赛  
    BEGIN = 1;  //开赛
    END = 2;    //已结束   
}

enum MatchType
{
    NONE = 0;
    TIMIGN = 1;         //定时赛
    PLAYER_FULL = 2;    //人满赛
}

enum MatchTag
{
    MT_NONE = 0;
    MT_GENERAL = 1;     //通用赛
    MT_DAY = 2;         //日赛
    MT_WEEK = 3;        //周赛
    MT_MONTH = 4;       //月赛
}

enum MatchForm
{
    MF_NONE = 0;
    MF_FREE = 1;        //免费赛
    MF_CHAM= 2;         //锦标赛
    MF_CASH = 3;        //收费赛
}

message Prop
{
    int64 id = 1;       //道具id
    int64 num = 2;      //道具数量
    int32 type = 3;     //道具类型
}

message FastMatchInfo
{
    bool fast = 1;                          //是否快速赛
    int32 operate_time = 2;                 //玩家在其回合结束前有 {xx} 秒的时间行动
    int32 first_player_operate_time = 3;    //先手玩家有 {xx} 秒的时间行动
    int32 combine_card_time = 4;            //所有玩家有 {xx} 秒的时间组合自己的牌
}

message MatchInfo {
    int64 match_config_id = 1;      //赛事配置id
    string match_instance_id = 2;   //赛事实例id
    string match_name = 3;          //赛事名称
    string match_pic = 4;           //图片链接
    int64 winnings = 5;             //总奖金
    int32 seats_cur = 6;            //当前报名数
    int32 seats_max = 7;            //最大报名数
    int32 winners = 8;              //有奖励的人数
    UserStatus user_status = 9;    //报名状态
    MatchStatus match_status = 10;  //比赛状态
    int64 entry_fee = 11;           //报名费
    int64 begin_time = 12;          //开赛时间
    int32 svid = 13;                //赛事svid
    int32 del_reg_end = 14;         //距离开赛x秒就不能取消报名退赛了
    MatchType match_type = 15;      //赛事类型
    int64 instance_id = 16;         //整数的赛事实例id
    bool sticky = 17;               //是否置顶
    uint32 chips =18;               //初始筹码
    int32 match_seq = 19;           //赛事顺序
    int64 regist_time = 20;         //开始报名时间
    bool new_player = 21;           //是否新手爽局
    repeated MatchTag match_tag = 22;   //赛事标签
    MatchForm match_form = 23;      //赛事形式
    repeated Prop entry_prop = 24;  //报名需要道具
    int64 regist_end_time = 25;     //结束报名时间
    int32 game_id = 26;             //新手爽局前端处理
    FastMatchInfo fast = 27;        //快速赛
    repeated JointMath joint_match = 28;     //联赛标识
}

message JointMath
{
    uint32 jointmatch_id = 1;
    JointMatchPhase sub_match_phase = 2;             // 联赛阶段:海选赛/初赛/半决赛/决赛/总决赛，取值JointMatchPhase
}

message MatchListResp {
    repeated MatchInfo match_list = 1;
    TagType tag_type = 2;
    int32 push_num = 3;             //剩余推送次数
    int32 game_id = 4;              //游戏id
    int64 srv_tm = 5;               //服务器时间
}

enum RegErrCode {
    SUCCESS = 0;                    //成功
    NOT_IN_REG_TIME = 1;            //不在报名时段内
    ALREADY_REG = 2;                //已经报名了
    ASSET_FAIL = 3;                 //资产不足
    MAX_REG_NUM_OUT = 4;            //超过最大报名人数
    SERVER_ERROR = 5;               //服务器错误
    NOT_IN_DELREG_TIME = 6;         //不在退赛时段内
    NOT_REG = 7;                    //没有报名
    TO_TASK = 8;                    //异常惩罚或者免费次数用完,需要做任务
    FREE_NUM_OUT = 9;               //免费次数用完
    SAME_IP_DEVICE = 10;            //防刷, 相同ip超过5个或者相同设备号超过1个          
    ABNORMAL_ACTION = 11;           //异常行为等级2
    REG_OTHER_PLAYERFULL = 12;      //已经报名了其他人满赛
    REQ_FAST = 13;                  //请求太频繁
    MATCH_CONFIG_CLOSE = 14;        //配置下架
}

//报名
message MatchRegReq {
    int32 game_id = 1;              //游戏id
    int64 match_config_id = 2;      //赛事配置id
    string match_instance_id = 3;   //赛事实例id
    string user_info = 4;           //登录获取的用户信息
    int64 instance_id = 5;          //整数的赛事实例id
    bool new_player = 6;           //是否新手爽局
    int64 act_instance_id = 7;      //活动实例id
}

message MatchRegResp {
    RegErrCode err_code = 1;
    string err_message = 2;
    string match_instance_id = 3;   //赛事实例id
    uint32 task_id = 4;             //任务id
    Prop cost = 5;                  //报名实际花费
    int32 free_num = 6;             //配置的免费赛次数
}



//退赛
message MatchDelRegReq {
    int32 game_id = 1;              //游戏id
    int64 match_config_id = 2;      //赛事id
    string match_instance_id = 3;   //赛事实例id
    string user_info = 4;           //登录获取的用户信息
    bool new_player = 5;           //是否新手爽局
}

message MatchDelRegResp {
    RegErrCode err_code = 1;
    string err_message = 2;
    string match_instance_id = 3;   //赛事实例id
    Prop cost = 4;                  //报名实际花费
}

//分页
message PageInfo
{
    int32 index = 1;                //第几页 从0开始
    int32 size = 2;                 //每页条数
}

//获取玩家历史比赛列表
message MatchUserHistoryListReq {
    int32 game_id = 1;  //游戏id 
    uint32 uid = 2;     //玩家id
    PageInfo page = 3;  //分页
}

message MatchUserHistoryInfo {
    enum MatchEndFlag
    {
        MATCH_END_CANCELLED = 0;    //取消
        MATCH_END_COMPLETED = 1;    //完成
        MATCH_RUNNING = 2;          //比赛中
    }

    int32 game_id = 1;              //游戏id 
    int64 match_config_id = 2;      //赛事id
    string match_instance_id = 3;   //赛事实例id
    int64 entry_fee = 4;            //报名费
    int64 begin_time = 5;           //开赛时间
    MatchEndFlag end_flag = 6;      //取消/完成
    string match_name = 7;          //赛事名称
    repeated Prop entry_prop = 8;   //报名门票
    bool share = 9;                 //是否有分享
    bool fast = 10;                 //是否快速赛
    int64 total_reward = 11;        //整个赛事的奖励
    int64 match_end_time = 12;      //赛事结束时间
    int32 your_rank = 13;           //自己的赛事排名
    int64 your_winnings = 14;       //自己比赛所获得的奖金
    repeated Prop your_winning_prop = 15;   //自己奖励门票
}

message MatchUserHistoryListResp {
    repeated MatchUserHistoryInfo match_user_history_list = 1;
    PageInfo page = 2;              //排行榜分页
    string share_instance_id = 3;   //需要分享的实例id
}


//获取某场历史赛事详情
message MatchHistoryDetailReq {
    int32 game_id = 1;              //游戏id 
    int64 match_config_id = 2;      //赛事id
    string match_instance_id = 3;   //赛事实例id
    uint32 uid = 4;                 //玩家id
    PageInfo page = 5;              //排行榜分页
}

message MatchRankInfo {
    uint32 uid = 1;         //玩家id
    string user_name = 2;   //玩家昵称
    string user_head = 3;   //玩家头像
    int32 rank = 4;         //排名
    int64 winnings = 5;     //奖金
    int32 winnings_flag = 6;//奖金是否到账
    int32 score = 7;        //分数
    int32 lv = 8;           //阶段数
    repeated Prop winning_prop = 9;//奖励门票
}

message MatchHistoryDetailResp {
    int64 match_config_id = 1;      //赛事id
    string match_instance_id = 2;   //赛事实例id
    string match_name = 3;          //赛事名称
    int64 entry_fee = 4;            //报名费
    int64 begin_time = 5;           //开赛时间
    int32 your_rank = 6;            //自己的赛事排名
    int64 total_winnings = 7;       //自己比赛所获得的奖金
    repeated MatchRankInfo rank_list = 8;//排行榜
    repeated Prop entry_prop = 9;   //报名门票
    repeated Prop winning_prop = 10;//奖励门票
    MatchRankInfo your_rank_info = 12;  //自己的赛事排名信息
    int32 page_index = 13;
    int32 game_id = 14;
    PageInfo page = 15;              //排行榜分页
    int32 joint_match = 16; //是否联赛 1、0
}


//赛事详情界面-Details
//基本需要展示所有php配置的数据
message MatchDetailsReq {
    int32 game_id = 1;              //游戏id 
    int64 match_config_id = 2;      //赛事id
    string match_instance_id = 3;   //赛事实例id
    bool new_player = 4;           //是否新手爽局
}


message MatchDetailsResp {
    message LevelInfo { //阶段配置
        //deal
        int32 level = 1;
        int32 tables = 2;
        int32 players = 3;
        int32 promoted = 4;
        //point
        int32 level_time = 5;   //显示对应轮次的有效持续时间分钟
        int64 pt_value = 6;     //显示对应轮次的底分
        int64 qualify = 7;      //显示对应轮次最低筹码要求
        bool rebuy = 8;         //是否能重复买入
        int64 rebuy_price = 9;  //显示对应轮次重复买入的价格, 若对应轮次不能重复买入, 则显示为-
        int64 reload = 10;      //显示对应轮次重复买入后可获得的筹码, 若对应轮次不能重复买入, 则显示为-

        int32 phase_num = 11;   //阶段局数
    }

    message RankInfo { //奖励配置
        string ranks = 1;
        int64 prizes = 2;
        repeated Prop prop = 3;    //奖励的道具
    }

    MatchInfo match_info = 1;
    repeated LevelInfo level_list = 2;
    repeated RankInfo rank_list = 3;
    string rules = 4;           //规则说明
    bool new_player = 5;        //是否新手爽局, 详情界面请求报名使用
    int64 srv_tm = 6;           //服务器时间
    bool rebuy = 7;             // 是否可以重复买入
}


//赛事详情界面-Leaderboard
//比赛结束前的排名是报名先后的排名, 所以报名也需要记录时间/昵称/头像
//比赛结束后的排名是比赛的排名
message MatchLeaderboardReq {
    int32 game_id = 1;              //游戏id 
    int64 match_config_id = 2;      //赛事id
    string match_instance_id = 3;   //赛事实例id
    bool new_player = 4;            //是否新手爽局
    PageInfo page = 5;              //分页
}

message MatchLeaderboardResp {
    repeated MatchRankInfo rank_list = 1;   //排行榜
    MatchRankInfo your_rank_info = 2;       //自己的赛事排名信息
    PageInfo page = 3;              //分页
}

//人满赛进入等待界面
message MatchPlayerFullWaitReq {
    int32 game_id = 1;              //游戏id 
    int64 match_config_id = 2;      //赛事id
    string match_instance_id = 3;   //赛事实例id 
    int32 push_num = 4;             //推送次数
}

message MatchPlayerFullWaitResp {
    int32 push_num = 1;             //剩余推送次数
    int32 seats_cur = 2;            //当前报名数
    int32 seats_max = 3;            //最大报名数
    int64 match_config_id = 4;      //赛事id
    string match_instance_id = 5;   //赛事实例id 
}

//新手爽局
message MatchNewPlayerReq {
    int32 game_id = 1;              //游戏id 
    string user_info = 2;           //登录获取的用户信息
}

message MatchNewPlayerConf {
    string match_name = 1;                           //赛事名字
    string match_pic = 2;                            //图片链接
    int32 seats_max = 3;                             //最大报名数
    uint32 share = 4;                                //分享
    repeated uint32 white_list = 5;                  //白名单
    repeated MatchDetailsResp.LevelInfo phase_list = 6;   //阶段
    repeated MatchDetailsResp.RankInfo reward_list = 7;   //奖励
}


message MatchNewPlayerResp {
    string ip = 1;                  //uid关联的ip
    string device_id = 2;           //uid关联的设备号
    bool new_player = 3;
    bool first_guide = 4;			//首局引导
    int32 match_config_id = 5;      //赛事配置id
    MatchNewPlayerConf config = 6;  //爽局配置
}


//广告位
message MatchAdReq {
}

message MatchAdInfo {
    string img_link = 1;            //图片链接
    bool is_jump = 2;               //是否跳转
    uint32 jump_type = 3;           //跳转类型 1-跳转子游戏 2-打开大图
    string jump_data = 4;           //跳转信息
    uint32 priority = 5;            //展示优先级
    uint32 display_position = 6;    //显示位置
