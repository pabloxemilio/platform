//新手爽局人满开赛通知
message MatchNewPlayerFullStartReq
{
    string match_instance_id = 1;   //赛事实例id 
}

message MatchNewPlayerFullStartResp
{
    string match_instance_id = 1;
}

///////////////////SharePoster结构与 agency_event_api::SharePoster保持一致//////////////////////
message Poster
{
    int32 id = 1;
    string url = 2;
}

message SharePoster
{
    string title = 1;
    string share_url = 2;
    string telegram = 3;
    string whatsapp = 4;
    repeated Poster poster = 5;
}

//在SharePosterResp的基础上,合入了对应分享配置的内容
message SharePosterMixed
{
    uint32 game = 1;
    uint32 share_type = 2;
    string invite_code = 3;
    SharePoster data = 4;
    int32 reward_cond = 5;  //派奖条件: 1 分享即派奖 2 注册即派奖  3 有效裂变派奖
    int32 show_flags = 6;	//第0bit位表示是否显示下载图片, 
                            //第1bit位表示是否显示复制链接, 
                            //第2bit位表示是否显示二维码
    repeated string download_pics = 7;   //分享的背景图  第一张是竖版  第二张是横板
    uint32 sub_type = 8; //子類型
}

//玩家历史记录分享
