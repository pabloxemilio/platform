			.main-loading {
				display: inline-flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				position: absolute;
				background-color: #0e0e0e;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
			}
			.main-loading > .spinner {
				width: 88px;
				height: 14px;
				text-align: center;
				box-sizing: border-box;
				line-height: 1;
				margin-top: 10px;
			}
			.main-loading > .spinner > div {
				width: 14px;
				height: 14px;
				border-radius: 100%;
				display: inline-block;
				animation: sk-bouncedelay 1.4s infinite ease-in-out both;
			}
			.main-loading > .spinner .bounce1 {
				animation-delay: -0.64s;
				background-color: #e7053d;
			}
			.main-loading > .spinner .bounce2 {
				animation-delay: -0.32s;
				background-color: #e7053d;
			}
			.main-loading > .spinner .bounce3 {
				background-color: #e7053d;
				animation-delay: -0.16s;
			}
			.main-loading > .spinner .bounce4 {
				background-color: #e7053d;
			}
			@keyframes sk-bouncedelay {
				0%,
				80%,
				100% {
					transform: scale(0);
				}
				40% {
					transform: scale(1);
				}
			}
			#main-error-message .alert {
				min-width: 300px;
				max-width: 800px;
				font-size: 14px;
			}

		<script>
			// Platform integration: served at /aviator.html (not /), so no root redirect.
			// Force all WebSocket connections to the SAME host:port serving this page,
			// so the game works on localhost / 127.0.0.1 / LAN IP / any port.
			;(function () {
				const Orig = window.WebSocket
				function Patched(url, protocols) {
					try {
						const u = new URL(url, window.location.href)
						const https = window.location.protocol === 'https:'
						u.protocol = https ? 'wss:' : 'ws:'
						// On https use the bare hostname (port 443 via the proxy); the game's
						// default ":3000" is for local dev only. On http keep the dev host:port.
						u.host = https ? window.location.hostname : window.location.host
						url = u.toString()
					} catch (e) {}
					return new Orig(url, protocols)
				}
				Patched.prototype = Orig.prototype
				Patched.CONNECTING = Orig.CONNECTING; Patched.OPEN = Orig.OPEN
				Patched.CLOSING = Orig.CLOSING; Patched.CLOSED = Orig.CLOSED
				window.WebSocket = Patched
			})()

			var coverSupport = 'CSS' in window && typeof CSS.supports === 'function' && (CSS.supports('top: env(a)') || CSS.supports('top: constant(a)'))
			document.write(
				'<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0' +
					(coverSupport ? ', viewport-fit=cover' : '') +
					'" />'
			)

			function setViewport() {
				const meta = document.querySelector('meta[name="viewport"]')
				if (!meta) return

				// 判断是否支持安全区域（刘海屏等）
				const coverSupport = window.CSS && CSS.supports('padding: env(safe-area-inset-top)')

				// 当宽高比 w/h >= 1.38 且高度小于 500 时，用设计稿宽度
				if (window.screen.width / window.screen.height >= 1.38 && window.screen.height < 500) {
					meta.setAttribute('content', 'width=1400, user-scalable=no')
				} else {
					meta.setAttribute(
						'content',
						'width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0' +
							(coverSupport ? ', viewport-fit=cover' : '')
					)
				}
			}
			// 监听屏幕宽高变化
			window.addEventListener('resize', setViewport)
			setViewport()

		<script>
			// Per-user currency: the game hardcodes "INR" as its label; rewrite it to the
			// user's currency (passed as ?cur=PKR|INR|USD by the lobby). Display-only.
			;(function () {
				var cur = (new URLSearchParams(location.search).get('cur') || 'PKR').toUpperCase()
				if (!/^[A-Z]{3}$/.test(cur) || cur === 'INR') return
				function fix(n) {
					if (n.nodeType === 3) {
						if (n.nodeValue && n.nodeValue.indexOf('INR') !== -1) {
							var v = n.nodeValue.replace(/\bINR\b/g, cur)
							if (v !== n.nodeValue) n.nodeValue = v
						}
					} else if (n.nodeType === 1) {
						for (var i = 0; i < n.childNodes.length; i++) fix(n.childNodes[i])
					}
				}
				var pending = false
				function schedule() { if (pending) return; pending = true; requestAnimationFrame(function () { pending = false; fix(document.body) }) }
				document.addEventListener('DOMContentLoaded', function () {
					fix(document.body)
					new MutationObserver(schedule).observe(document.body, { childList: true, subtree: true, characterData: true })
				})
			})()
