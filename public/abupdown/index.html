  <!-- 7 Up 7 Down now uses the sprlbegaming client (/sprl7ud). Any stale link to
       this old KB demo redirects there, carrying the platform token along. -->
  <script>
  (function(){
    try{
      var p = new URLSearchParams(location.search);
      var tok = p.get("token") || "", jwt = "";
      if(/^eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\./.test(tok)) jwt = tok;            // raw JWT
      else { try{ var dec = atob(decodeURIComponent(tok)); var m = dec.match(/token=([^&]+)/); if(m) jwt = m[1]; }catch(e){} }  // KB blob
      if(!jwt){ var ag = p.get("agent"); if(ag){ try{ var u = atob(decodeURIComponent(ag)); var mm = u.match(/ptoken=([^&]+)/); if(mm) jwt = decodeURIComponent(mm[1]); }catch(e){} } }
      location.replace('/sprl7ud/index.html' + (jwt ? '?token=' + encodeURIComponent(jwt) : ''));
    }catch(e){ location.replace('/sprl7ud/index.html'); }
  })();
  </script>

    <div id="splashbg">

    </div>

   <div id="splashcc">
		<div id="animation">

		</div>	
		
		<div id="progressText" style="position: absolute; top: 220px;left: 0;right: 0;text-align: center; color: white; font-size: 40px; display: none;">
		0%
		</div>  
    </div>	  
<script type="text/javascript" super-html="true">
  (function () {
		var splashbg = document.getElementById('splashbg');
		splashbg.style.display = 'block';
		var splashcc = document.getElementById('splashcc');
		splashcc.style.display = 'block';
		var animation = document.getElementById('animation');
		animation.style.display = 'block';
	})();
	var ccgameprogress = 0;
	var ccgameloading = setInterval(()=>{
		if(ccgameprogress >= 80){
			ccgameprogress += 0.05;
		}else{
			ccgameprogress += 1;
		}
		if(ccgameprogress >= 90){
			clearInterval(ccgameloading);
		}
		var progressText = document.getElementById('progressText');
		progressText.innerHTML = `${Math.floor(ccgameprogress)}%`;
	},50);
	setTimeout(()=>{
		var progressText = document.getElementById('progressText');
		progressText.style.display = 'none';
	}, 4000);
	window.ccgameloading = ccgameloading;
</script>
