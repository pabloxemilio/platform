 <style>
    .loading-wrap {
      width: 100%;
      height: 100%;
      position: fixed;
      left: 0px;
      top: 0px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .kbp-loading {
      display: none;
      width: 100%;
      max-width: 768px;
      max-height: 1800px;
      height: 100%;
      position: relative;
      background: url('./junglee_bg2_6a83b3.jpg') center/auto 100% no-repeat;

    }

    .junglee-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -468%);
      max-width: 213px;
      width: 38%;

    }

    .junglee-loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -96%);
      max-width: 100px;
      width: 20%;

    }

    .junglee-title-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -340%);
      max-width: 266px;
      width: 47%;

    }

    .junglee_authority {
      position: absolute;
      left: 50%;
      transform: translate(-50%, 0);
      bottom: 20px;
      width: 90%;
      max-width: 480px;
    }

    @media (max-width: 576px) {
      .kbp-loading {
        background-size: 100% auto;
      }
    }

    /* 手机 */
    @media (min-width: 576px) and (max-width:900px) {
      .kbp-loading {
        background-size: 100% auto;
        max-width: none;
      }

      .junglee_authority {
        max-width: none;
      }

      .junglee-logo {
        max-width: 345px;
      }

      .junglee-loading {
        max-width: 154px;
      }

      .junglee-title-logo {
        max-width: 406px;
      }
    }

    @media (max-height: 680px) {
      .junglee-logo {
        display: none;
      }

      .junglee-title-logo {
        transform: translate(-50%, -274%);
      }
    }

    @media (min-width: 1000px) and (max-height:768px) {
      .junglee-title-logo {
        max-width: 180px;
      }

      .junglee-logo {
        max-width: 147px;
      }

      .junglee-loading {
        max-width: 63px;
      }

      .junglee_authority {
        max-width: 302px;
      }
    }

    @media (min-width: 1000px) and (max-height:880px) {
      .junglee-title-logo {
        max-width: 180px;
      }

      .junglee-logo {
        max-width: 147px;
      }

      .junglee-loading {
        max-width: 63px;
      }

      .junglee_authority {
        max-width: 290px;
      }
    }

    @media (min-width: 1000px) and (min-height:876px) and (max-height:1120px) {
      .junglee_authority {
        max-width: 402px;
      }
    }
  </style>
